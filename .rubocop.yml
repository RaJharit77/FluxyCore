AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  Exclude:
    - 'vendor/**/*'
    - 'bin/**/*'

# Règles adaptées au projet
Style/Documentation:
  Enabled: false

Metrics/MethodLength:
  Max: 20

Metrics/AbcSize:
  Max: 25

Style/FrozenStringLiteralComment:
  Enabled: false

# Éviter les conflits avec les doubles quotes de Crystal
Style/StringLiterals:
  EnforcedStyle: double_quotes